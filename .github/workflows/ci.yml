name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  compile-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # Syntax/import-structure check only. No dependencies are installed and
      # no Telegram/Gemini/Supabase calls are made here on purpose — see
      # CONTRIBUTING.md: this bot calls paid, metered APIs and is verified
      # manually against a test bot, never automatically in CI.
      - name: Compile all Python files
        run: python -m compileall -q .
